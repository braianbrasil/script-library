<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Script Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: #252a38;
    --border2: #2e3448;
    --text: #e8eaf0;
    --muted: #6b7280;
    --muted2: #4b5260;
    --sql: #3ecf8e;
    --sql-bg: #0d2e20;
    --sql-border: #1a4a32;
    --ruby: #e84d7a;
    --ruby-bg: #2a0e1a;
    --ruby-border: #4a1a2e;
    --accent: #7c6fff;
    --accent-bg: #1a1730;
    --tag-bg: #1e2233;
    --tag-text: #8892a4;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ---- HEADER ---- */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: rgba(13, 15, 20, 0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .header-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .header-stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-stat span:first-child {
    color: var(--text);
    font-weight: 500;
  }

  /* ---- LAYOUT ---- */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 60px);
    position: relative;
    z-index: 1;
  }

  /* ---- SIDEBAR ---- */
  aside {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 28px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }

  .filter-btn:hover { background: var(--surface2); color: var(--text); }

  .filter-btn.active {
    background: var(--surface2);
    border-color: var(--border2);
    color: var(--text);
  }

  .filter-btn.active.sql { color: var(--sql); border-color: var(--sql-border); background: var(--sql-bg); }
  .filter-btn.active.ruby { color: var(--ruby); border-color: var(--ruby-border); background: var(--ruby-bg); }

  .filter-count {
    font-size: 11px;
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 20px;
    color: var(--muted);
  }

  .filter-btn.active.sql .filter-count { background: var(--sql-bg); color: var(--sql); }
  .filter-btn.active.ruby .filter-count { background: var(--ruby-bg); color: var(--ruby); }

  /* ---- MAIN ---- */
  main {
    padding: 28px 32px;
  }

  /* ---- SEARCH BAR ---- */
  .search-wrap {
    margin-bottom: 24px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 11px 16px 11px 40px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted2); }
  #search:focus { border-color: var(--accent); }

  /* ---- RESULTS BAR ---- */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--muted);
  }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    outline: none;
    cursor: pointer;
  }

  /* ---- SCRIPT GRID ---- */
  .script-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }

  /* ---- SCRIPT CARD ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .card.sql:hover { border-color: var(--sql-border); }
  .card.ruby:hover { border-color: var(--ruby-border); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .card.sql .card-header { border-bottom-color: var(--sql-border); }
  .card.ruby .card-header { border-bottom-color: var(--ruby-border); }

  .card-lang {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--mono);
  }

  .sql .card-lang { color: var(--sql); background: var(--sql-bg); border: 1px solid var(--sql-border); }
  .ruby .card-lang { color: var(--ruby); background: var(--ruby-bg); border: 1px solid var(--ruby-border); }

  .card-folder {
    font-size: 11px;
    color: var(--muted2);
  }

  .card-body { padding: 12px 14px; }

  .card-name {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid var(--border);
  }

  .card-footer {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted2);
  }

  .card-date { }
  .card-author { display: flex; align-items: center; gap: 5px; }
  .avatar {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--accent);
  }

  /* ---- MODAL ---- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.97) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .modal-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .modal-meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .modal-close:hover { color: var(--text); border-color: var(--border2); }

  .modal-body {
    overflow-y: auto;
    flex: 1;
  }

  .modal-desc {
    padding: 14px 20px;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    line-height: 1.7;
  }

  pre {
    margin: 0;
    padding: 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    overflow-x: auto;
    background: var(--bg);
  }

  .modal-foot {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }

  .btn-ghost {
    background: transparent;
    border-color: var(--border2);
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text); }

  .btn-copy {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-copy:hover { background: var(--accent); color: #fff; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted2);
    font-size: 13px;
  }

  .empty-title {
    font-family: var(--display);
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* syntax highlight stubs */
  .kw { color: #7c6fff; }
  .str { color: #3ecf8e; }
  .cm { color: #4b5260; font-style: italic; }
  .fn { color: #e2b96f; }
  .num { color: #e84d7a; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 20px 16px; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Script Library
  </div>
  <div class="header-meta">
    <div class="header-stat">
      <span id="stat-total">0</span>
      <span>scripts</span>
    </div>
    <div class="header-stat">
      <span id="stat-sql">0</span>
      <span>SQL</span>
    </div>
    <div class="header-stat">
      <span id="stat-ruby">0</span>
      <span>Ruby</span>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Language</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
        All scripts
        <span class="filter-count" id="cnt-all">0</span>
      </button>
      <button class="filter-btn sql" data-filter="sql" onclick="setFilter('sql',this)">
        .sql
        <span class="filter-count" id="cnt-sql">0</span>
      </button>
      <button class="filter-btn ruby" data-filter="ruby" onclick="setFilter('ruby',this)">
        .rb
        <span class="filter-count" id="cnt-ruby">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Folder</div>
      <div id="folder-filters"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div id="tag-filters"></div>
    </div>
  </aside>

  <main>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search scripts, descriptions, tags..." oninput="render()"/>
    </div>

    <div class="results-bar">
      <span id="results-count"></span>
      <select class="sort-select" onchange="render()">
        <option value="name">Sort: name</option>
        <option value="date">Sort: newest</option>
        <option value="lang">Sort: language</option>
      </select>
    </div>

    <div class="script-grid" id="grid"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modal-desc"></div>
      <pre id="modal-code"></pre>
    </div>
    <div class="modal-foot">
      <div id="modal-tags" style="display:flex;gap:5px;flex:1;flex-wrap:wrap;"></div>
      <button class="btn btn-ghost" onclick="closeModalDirect()">Close</button>
      <button class="btn btn-copy" id="copy-btn" onclick="copyCode()">Copy code</button>
    </div>
  </div>
</div>

<script>
// ── DEMO SCRIPTS ─────────────────────────────────────────────────────────────
// Replace this array with your real scripts, or load dynamically from JSON.
const SCRIPTS = [
  {
    id: 1, lang: "sql", folder: "reports",
    name: "monthly_revenue_report.sql",
    desc: "Aggregates monthly revenue by product category, includes YoY comparison and running totals.",
    tags: ["reports","finance","aggregation"],
    author: "vc", date: "2024-11-15",
    code: `-- Monthly Revenue Report
-- Compares current month vs same month last year

<span class="kw">WITH</span> monthly_sales <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,
    category,
    <span class="fn">SUM</span>(amount)                         <span class="kw">AS</span> revenue
  <span class="kw">FROM</span> orders
  <span class="kw">WHERE</span> status = <span class="str">'completed'</span>
  <span class="kw">GROUP BY</span> <span class="num">1</span>, <span class="num">2</span>
)
<span class="kw">SELECT</span>
  month,
  category,
  revenue,
  <span class="fn">LAG</span>(revenue, <span class="num">12</span>) <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> month
  ) <span class="kw">AS</span> revenue_prev_year,
  <span class="fn">ROUND</span>(
    (revenue - <span class="fn">LAG</span>(revenue, <span class="num">12</span>) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> month))
    / <span class="fn">NULLIF</span>(<span class="fn">LAG</span>(revenue, <span class="num">12</span>) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> month), <span class="num">0</span>) * <span class="num">100</span>, <span class="num">2</span>
  ) <span class="kw">AS</span> yoy_growth_pct
<span class="kw">FROM</span> monthly_sales
<span class="kw">ORDER BY</span> month <span class="kw">DESC</span>, revenue <span class="kw">DESC</span>;`
  },
  {
    id: 2, lang: "sql", folder: "reports",
    name: "active_users_daily.sql",
    desc: "Daily active users (DAU) report with 7-day rolling average and retention funnel breakdown.",
    tags: ["analytics","users","dau"],
    author: "jm", date: "2024-12-02",
    code: `-- Daily Active Users (DAU) with rolling average

<span class="kw">SELECT</span>
  activity_date,
  <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id)   <span class="kw">AS</span> dau,
  <span class="fn">ROUND</span>(<span class="fn">AVG</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id)) <span class="kw">OVER</span> (
    <span class="kw">ORDER BY</span> activity_date
    <span class="kw">ROWS BETWEEN</span> <span class="num">6</span> <span class="kw">PRECEDING AND CURRENT ROW</span>
  ), <span class="num">0</span>)                       <span class="kw">AS</span> rolling_7d_avg
<span class="kw">FROM</span> user_events
<span class="kw">WHERE</span> activity_date >= <span class="fn">CURRENT_DATE</span> - <span class="kw">INTERVAL</span> <span class="str">'90 days'</span>
<span class="kw">GROUP BY</span> activity_date
<span class="kw">ORDER BY</span> activity_date <span class="kw">DESC</span>;`
  },
  {
    id: 3, lang: "sql", folder: "migrations",
    name: "add_customer_tier_column.sql",
    desc: "Adds customer_tier enum column to customers table. Backfills existing records based on lifetime value.",
    tags: ["migration","schema","customers"],
    author: "vc", date: "2025-01-08",
    code: `-- Migration: Add customer_tier column
-- Run once. Idempotent.

<span class="kw">BEGIN</span>;

<span class="kw">ALTER TABLE</span> customers
  <span class="kw">ADD COLUMN IF NOT EXISTS</span> customer_tier <span class="fn">VARCHAR</span>(<span class="num">20</span>)
    <span class="kw">DEFAULT</span> <span class="str">'standard'</span>
    <span class="kw">NOT NULL</span>;

<span class="cm">-- Backfill: classify by lifetime spend</span>
<span class="kw">UPDATE</span> customers c
<span class="kw">SET</span> customer_tier = <span class="kw">CASE</span>
  <span class="kw">WHEN</span> lifetime_spend >= <span class="num">10000</span> <span class="kw">THEN</span> <span class="str">'platinum'</span>
  <span class="kw">WHEN</span> lifetime_spend >= <span class="num">2500</span>  <span class="kw">THEN</span> <span class="str">'gold'</span>
  <span class="kw">WHEN</span> lifetime_spend >= <span class="num">500</span>   <span class="kw">THEN</span> <span class="str">'silver'</span>
  <span class="kw">ELSE</span> <span class="str">'standard'</span>
<span class="kw">END</span>;

<span class="kw">COMMIT</span>;`
  },
  {
    id: 4, lang: "sql", folder: "utils",
    name: "find_duplicate_emails.sql",
    desc: "Finds duplicate email addresses in the users table. Useful for data cleanup before unique index migration.",
    tags: ["utils","data-quality","dedup"],
    author: "jm", date: "2024-10-20",
    code: `-- Find duplicate emails in users table

<span class="kw">SELECT</span>
  email,
  <span class="fn">COUNT</span>(*) <span class="kw">AS</span> occurrences,
  <span class="fn">ARRAY_AGG</span>(id <span class="kw">ORDER BY</span> created_at) <span class="kw">AS</span> user_ids,
  <span class="fn">MIN</span>(created_at) <span class="kw">AS</span> first_seen
<span class="kw">FROM</span> users
<span class="kw">GROUP BY</span> email
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">1</span>
<span class="kw">ORDER BY</span> occurrences <span class="kw">DESC</span>;`
  },
  {
    id: 5, lang: "ruby", folder: "etl",
    name: "sync_customers_to_crm.rb",
    desc: "Syncs new and updated customer records from the database to HubSpot CRM via API. Handles rate limiting and retries.",
    tags: ["etl","hubspot","crm","api"],
    author: "vc", date: "2025-02-10",
    code: `<span class="cm"># sync_customers_to_crm.rb</span>
<span class="cm"># Syncs customers to HubSpot. Run via cron or manually.</span>

<span class="cm"># Prints table sizes sorted by total size (desc)</span>

<span class="kw">require</span> <span class="str">'pg'</span>

conn = PG.connect(ENV[<span class="str">'DATABASE_URL'</span>])

SQL = <span class="str"><<~SQL
  SELECT
    relname                               AS table_name,
    pg_size_pretty(pg_relation_size(oid)) AS table_size,
    pg_size_pretty(pg_indexes_size(oid))  AS index_size,
    pg_size_pretty(pg_total_relation_size(oid)) AS total_size,
    to_char(n_live_tup, 'FM999,999,999') AS row_count
  FROM pg_stat_user_tables
  ORDER BY pg_total_relation_size(oid) DESC
  LIMIT 30;

results.each { |r| printf fmt, *r.values }

conn.close`

// ── STATE ────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentFolder = 'all';
let currentTag    = 'all';

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const folders = [...new Set(SCRIPTS.map(s => s.folder))].sort();
  const tags    = [...new Set(SCRIPTS.flatMap(s => s.tags))].sort();

  const fEl = document.getElementById('folder-filters');
  fEl.innerHTML = `
    <button class="filter-btn active" onclick="setFolder('all',this)">
      All folders <span class="filter-count">${SCRIPTS.length}</span>
    </button>
    ${folders.map(f => `
      <button class="filter-btn" onclick="setFolder('${f}',this)">
        ${f}/ <span class="filter-count">${SCRIPTS.filter(s=>s.folder===f).length}</span>
      </button>`).join('')}`;

  const tEl = document.getElementById('tag-filters');
  tEl.innerHTML = `
    <button class="filter-btn active" onclick="setTag('all',this)">All tags</button>
    ${tags.map(t => `
      <button class="filter-btn" onclick="setTag('${t}',this)">#${t}</button>`).join('')}`;

  document.getElementById('cnt-all').textContent  = SCRIPTS.length;
  document.getElementById('cnt-sql').textContent  = SCRIPTS.filter(s=>s.lang==='sql').length;
  document.getElementById('cnt-ruby').textContent = SCRIPTS.filter(s=>s.lang==='ruby').length;
  document.getElementById('stat-total').textContent = SCRIPTS.length;
  document.getElementById('stat-sql').textContent   = SCRIPTS.filter(s=>s.lang==='sql').length;
  document.getElementById('stat-ruby').textContent  = SCRIPTS.filter(s=>s.lang==='ruby').length;
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setFolder(val, btn) {
  currentFolder = val;
  btn.closest('.sidebar-section').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setTag(val, btn) {
  currentTag = val;
  btn.closest('.sidebar-section').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.querySelector('.sort-select').value;

  let list = SCRIPTS.filter(s => {
    if (currentFilter !== 'all' && s.lang !== currentFilter) return false;
    if (currentFolder !== 'all' && s.folder !== currentFolder) return false;
    if (currentTag    !== 'all' && !s.tags.includes(currentTag)) return false;
    if (q && !s.name.toLowerCase().includes(q) &&
             !s.desc.toLowerCase().includes(q) &&
             !s.tags.some(t => t.includes(q))) return false;
    return true;
  });

  if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'date') list.sort((a,b) => b.date.localeCompare(a.date));
  if (sort === 'lang') list.sort((a,b) => a.lang.localeCompare(b.lang));

  const grid = document.getElementById('grid');
  document.getElementById('results-count').textContent =
    `${list.length} script${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-title">No scripts found</div>
      Try a different search or filter.
    </div>`;
    return;
  }

  grid.innerHTML = list.map((s, i) => `
    <div class="card ${s.lang}" onclick="openModal(${s.id})"
         style="animation-delay:${i*0.03}s">
      <div class="card-header">
        <span class="card-lang">${s.lang}</span>
        <span class="card-folder">${s.folder}/</span>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-tags">
          ${s.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        <span class="card-date">${s.date}</span>
        <span class="card-author">
          <span class="avatar">${s.author[0].toUpperCase()}</span>
          ${s.author}
        </span>
      </div>
    </div>`).join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────
let activeScript = null;

function openModal(id) {
  activeScript = SCRIPTS.find(s => s.id === id);
  if (!activeScript) return;
  document.getElementById('modal-title').textContent = activeScript.name;
  document.getElementById('modal-meta').innerHTML =
    `<span>${activeScript.lang.toUpperCase()}</span>
     <span>${activeScript.folder}/</span>
     <span>${activeScript.date}</span>
     <span>by ${activeScript.author}</span>`;
  document.getElementById('modal-desc').textContent = activeScript.desc;
  document.getElementById('modal-code').innerHTML   = activeScript.code;
  document.getElementById('modal-tags').innerHTML   =
    activeScript.tags.map(t=>`<span class="tag">#${t}</span>`).join('');
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('copy-btn').textContent = 'Copy code';
}

function copyCode() {
  if (!activeScript) return;
  const plain = activeScript.code.replace(/<[^>]+>/g, '');
  navigator.clipboard.writeText(plain).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy code', 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
render();
</script>
