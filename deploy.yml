name: Build & Deploy Script Library

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build index.json
        run: |
          node -e "
            const fs   = require('fs');
            const path = require('path');

            function walk(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  results = results.concat(walk(full));
                } else if (
                  entry.name.endsWith('.json') &&
                  entry.name !== 'index.json' &&
                  entry.name !== 'package.json'
                ) {
                  results.push(full);
                }
              }
              return results;
            }

            const jsonFiles = [...walk('sql'), ...walk('ruby')];
            const scripts = [];
            let id = 1;

            for (const jsonPath of jsonFiles) {
              try {
                const meta     = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                const dir      = path.dirname(jsonPath);
                const baseName = path.basename(jsonPath, '.json');
                const ext      = meta.lang === 'ruby' ? '.rb' : '.sql';
                const codePath = path.join(dir, baseName + ext);

                let code = '';
                if (fs.existsSync(codePath)) {
                  code = fs.readFileSync(codePath, 'utf8');
                } else {
                  console.warn('No code file found for:', jsonPath);
                }

                scripts.push({ id: id++, ...meta, code });
              } catch(e) {
                console.warn('Skipping', jsonPath, '-', e.message);
              }
            }

            scripts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            fs.writeFileSync('index.json', JSON.stringify(scripts, null, 2));
            console.log('Built index.json with ' + scripts.length + ' scripts.');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
