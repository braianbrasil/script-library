<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Script Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e28;
    --border:#252a38;--border2:#2e3448;
    --text:#e8eaf0;--muted:#6b7280;--muted2:#4b5260;
    --sql:#3ecf8e;--sql-bg:#0d2e20;--sql-border:#1a4a32;
    --ruby:#e84d7a;--ruby-bg:#2a0e1a;--ruby-border:#4a1a2e;
    --accent:#7c6fff;--accent-bg:#1a1730;
    --tag-bg:#1e2233;--tag-text:#8892a4;
    --radius:10px;
    --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;min-height:100vh;line-height:1.6}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}

  header{border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;background:rgba(13,15,20,.92);backdrop-filter:blur(12px);z-index:100}
  .logo{font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
  .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
  .header-meta{font-size:12px;color:var(--muted);display:flex;gap:20px;align-items:center}
  .header-stat span:first-child{color:var(--text);font-weight:500}

  .layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 60px);position:relative;z-index:1}

  aside{border-right:1px solid var(--border);padding:24px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
  .sidebar-section{padding:0 16px;margin-bottom:28px}
  .sidebar-label{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;padding:0 4px}
  .filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 10px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);font-family:var(--mono);font-size:13px;cursor:pointer;transition:all .15s;text-align:left;margin-bottom:2px}
  .filter-btn:hover{background:var(--surface2);color:var(--text)}
  .filter-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
  .filter-btn.active.sql{color:var(--sql);border-color:var(--sql-border);background:var(--sql-bg)}
  .filter-btn.active.ruby{color:var(--ruby);border-color:var(--ruby-border);background:var(--ruby-bg)}
  .filter-count{font-size:11px;background:var(--surface2);padding:1px 7px;border-radius:20px;color:var(--muted)}
  .filter-btn.active.sql .filter-count{background:var(--sql-bg);color:var(--sql)}
  .filter-btn.active.ruby .filter-count{background:var(--ruby-bg);color:var(--ruby)}

  main{padding:28px 32px}

  .search-wrap{margin-bottom:24px;position:relative}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  #search{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 16px 11px 40px;font-family:var(--mono);font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
  #search::placeholder{color:var(--muted2)}
  #search:focus{border-color:var(--accent)}

  .results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:12px;color:var(--muted)}
  .sort-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:var(--mono);font-size:12px;color:var(--muted);outline:none;cursor:pointer}

  .script-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;animation:fadeUp .3s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card:hover{border-color:var(--border2);transform:translateY(-2px)}
  .card.sql:hover{border-color:var(--sql-border)}
  .card.ruby:hover{border-color:var(--ruby-border)}

  .card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border)}
  .card.sql .card-header{border-bottom-color:var(--sql-border)}
  .card.ruby .card-header{border-bottom-color:var(--ruby-border)}
  .card-lang{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-family:var(--mono)}
  .sql .card-lang{color:var(--sql);background:var(--sql-bg);border:1px solid var(--sql-border)}
  .ruby .card-lang{color:var(--ruby);background:var(--ruby-bg);border:1px solid var(--ruby-border)}
  .card-folder{font-size:11px;color:var(--muted2)}

  .card-body{padding:12px 14px}
  .card-name{font-family:var(--display);font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--tag-bg);color:var(--tag-text);border:1px solid var(--border)}

  .card-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted2)}
  .avatar{width:16px;height:16px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--accent)}

  /* loading state */
  .loading{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
  .spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted2)}
  .empty-title{font-family:var(--display);font-size:18px;color:var(--muted);margin-bottom:8px}

  /* modal */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:24px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:modalIn .2s ease}
  @keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .modal-title{font-family:var(--display);font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
  .modal-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
  .modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .modal-close:hover{color:var(--text);border-color:var(--border2)}
  .modal-body{overflow-y:auto;flex:1}
  .modal-desc{padding:14px 20px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);line-height:1.7}
  pre{margin:0;padding:20px;font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--text);overflow-x:auto;background:var(--bg)}
  .modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;justify-content:flex-end}
  .btn{padding:8px 16px;border-radius:7px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
  .btn-ghost{background:transparent;border-color:var(--border2);color:var(--muted)}
  .btn-ghost:hover{color:var(--text);border-color:var(--text)}
  .btn-copy{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
  .btn-copy:hover{background:var(--accent);color:#fff}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  @media(max-width:720px){
    .layout{grid-template-columns:1fr}
    aside{display:none}
    main{padding:20px 16px}
    header{padding:0 16px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Script Library
  </div>
  <div class="header-meta">
    <div class="header-stat"><span id="stat-total">—</span><span>scripts</span></div>
    <div class="header-stat"><span id="stat-sql">—</span><span>SQL</span></div>
    <div class="header-stat"><span id="stat-ruby">—</span><span>Ruby</span></div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Language</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
        All scripts <span class="filter-count" id="cnt-all">—</span>
      </button>
      <button class="filter-btn sql" data-filter="sql" onclick="setFilter('sql',this)">
        .sql <span class="filter-count" id="cnt-sql">—</span>
      </button>
      <button class="filter-btn ruby" data-filter="ruby" onclick="setFilter('ruby',this)">
        .rb <span class="filter-count" id="cnt-ruby">—</span>
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Folder</div>
      <div id="folder-filters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div id="tag-filters"></div>
    </div>
  </aside>

  <main>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search scripts, descriptions, tags..." oninput="render()"/>
    </div>
    <div class="results-bar">
      <span id="results-count"></span>
      <select class="sort-select" onchange="render()">
        <option value="date">Sort: newest</option>
        <option value="name">Sort: name</option>
        <option value="lang">Sort: language</option>
      </select>
    </div>
    <div class="script-grid" id="grid">
      <div class="loading">
        <div class="spinner"></div>
        Loading scripts...
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-desc" id="modal-desc"></div>
      <pre id="modal-code"></pre>
    </div>
    <div class="modal-foot">
      <div id="modal-tags" style="display:flex;gap:5px;flex:1;flex-wrap:wrap"></div>
      <button class="btn btn-ghost" onclick="closeModalDirect()">Close</button>
      <button class="btn btn-copy" id="copy-btn" onclick="copyCode()">Copy code</button>
    </div>
  </div>
</div>

<script>
let ALL_SCRIPTS = [];
let currentFilter = 'all';
let currentFolder = 'all';
let currentTag    = 'all';
let activeScript  = null;

// ── LOAD ────────────────────────────────────────────────────────────────────
async function loadScripts() {
  try {
    const res = await fetch('index.json?v=' + Date.now());
    if (!res.ok) throw new Error('index.json not found');
    ALL_SCRIPTS = await res.json();
  } catch(e) {
    ALL_SCRIPTS = [];
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-title">No scripts found</div>
        Push your scripts and their .json metadata files, then GitHub Actions will build index.json automatically.
      </div>`;
    return;
  }
  buildSidebar();
  render();
}

// ── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const folders = [...new Set(ALL_SCRIPTS.map(s => s.folder))].sort();
  const tags    = [...new Set(ALL_SCRIPTS.flatMap(s => s.tags || []))].sort();
  const total   = ALL_SCRIPTS.length;
  const sqlN    = ALL_SCRIPTS.filter(s => s.lang === 'sql').length;
  const rubyN   = ALL_SCRIPTS.filter(s => s.lang === 'ruby').length;

  document.getElementById('cnt-all').textContent  = total;
  document.getElementById('cnt-sql').textContent  = sqlN;
  document.getElementById('cnt-ruby').textContent = rubyN;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-sql').textContent   = sqlN;
  document.getElementById('stat-ruby').textContent  = rubyN;

  document.getElementById('folder-filters').innerHTML =
    `<button class="filter-btn active" onclick="setFolder('all',this)">
       All folders <span class="filter-count">${total}</span>
     </button>` +
    folders.map(f =>
      `<button class="filter-btn" onclick="setFolder('${f}',this)">
         ${f}/ <span class="filter-count">${ALL_SCRIPTS.filter(s=>s.folder===f).length}</span>
       </button>`
    ).join('');

  document.getElementById('tag-filters').innerHTML =
    `<button class="filter-btn active" onclick="setTag('all',this)">All tags</button>` +
    tags.map(t =>
      `<button class="filter-btn" onclick="setTag('${t}',this)">#${t}</button>`
    ).join('');
}

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setFolder(val, btn) {
  currentFolder = val;
  btn.closest('.sidebar-section').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setTag(val, btn) {
  currentTag = val;
  btn.closest('.sidebar-section').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function highlight(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(--|#)[^\n]*/g, m => `<span style="color:#4b5260;font-style:italic">${m}</span>`)
    .replace(/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP BY|ORDER BY|HAVING|WITH|AS|CASE|WHEN|THEN|ELSE|END|INSERT|UPDATE|DELETE|SET|CREATE|ALTER|DROP|TABLE|INDEX|BEGIN|COMMIT|ROLLBACK|NOT|NULL|AND|OR|IN|IS|LIMIT|OFFSET|DISTINCT|COUNT|SUM|AVG|MIN|MAX|ROUND|DATE_TRUNC|LAG|LEAD|OVER|PARTITION BY|ROWS BETWEEN|CURRENT ROW|PRECEDING|FOLLOWING|INTERVAL|IF NOT EXISTS|DEFAULT|RETURNING)\b/gi,
      m => `<span style="color:#7c6fff">${m}</span>`)
    .replace(/\b(require|class|def|end|do|if|else|elsif|unless|while|for|each|map|select|reject|reduce|new|return|true|false|nil|self|super|attr_accessor|private|public|protected|include|extend|module|raise|rescue|ensure|begin|yield|block_given)\b/g,
      m => `<span style="color:#7c6fff">${m}</span>`)
    .replace(/'([^']*)'/g, `<span style="color:#3ecf8e">'$1'</span>`)
    .replace(/"([^"]*)"/g, `<span style="color:#3ecf8e">"$1"</span>`)
    .replace(/\b(\d+(\.\d+)?)\b/g, `<span style="color:#e84d7a">$1</span>`);
}

function render() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.querySelector('.sort-select').value;

  let list = ALL_SCRIPTS.filter(s => {
    if (currentFilter !== 'all' && s.lang !== currentFilter) return false;
    if (currentFolder !== 'all' && s.folder !== currentFolder) return false;
    if (currentTag    !== 'all' && !(s.tags||[]).includes(currentTag)) return false;
    if (q && !s.name.toLowerCase().includes(q) &&
             !(s.desc||'').toLowerCase().includes(q) &&
             !(s.tags||[]).some(t => t.includes(q))) return false;
    return true;
  });

  if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'date') list.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if (sort === 'lang') list.sort((a,b) => a.lang.localeCompare(b.lang));

  document.getElementById('results-count').textContent =
    `${list.length} script${list.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-title">No scripts found</div>
      Try a different search or filter.
    </div>`;
    return;
  }

  grid.innerHTML = list.map((s, i) => `
    <div class="card ${s.lang}" onclick="openModal(${s.id})"
         style="animation-delay:${i*0.03}s">
      <div class="card-header">
        <span class="card-lang">${s.lang}</span>
        <span class="card-folder">${s.folder}/</span>
      </div>
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc || ''}</div>
        <div class="card-tags">
          ${(s.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        <span>${s.date || ''}</span>
        <span style="display:flex;align-items:center;gap:5px">
          <span class="avatar">${(s.author||'?')[0].toUpperCase()}</span>
          ${s.author || ''}
        </span>
      </div>
    </div>`).join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  activeScript = ALL_SCRIPTS.find(s => s.id === id);
  if (!activeScript) return;
  document.getElementById('modal-title').textContent = activeScript.name;
  document.getElementById('modal-meta').innerHTML =
    `<span>${activeScript.lang.toUpperCase()}</span>
     <span>${activeScript.folder}/</span>
     <span>${activeScript.date || ''}</span>
     <span>by ${activeScript.author || ''}</span>`;
  document.getElementById('modal-desc').textContent = activeScript.desc || '';
  document.getElementById('modal-code').innerHTML = highlight(activeScript.code || '-- no code found');
  document.getElementById('modal-tags').innerHTML =
    (activeScript.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('copy-btn').textContent = 'Copy code';
}

function copyCode() {
  if (!activeScript) return;
  navigator.clipboard.writeText(activeScript.code || '').then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy code', 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

loadScripts();
</script>
</body>
</html>
